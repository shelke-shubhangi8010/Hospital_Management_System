<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(to right,#eef4ff,#f9fbff);
min-height:100vh;
}

.header{
background:linear-gradient(to right,#0d6efd,#4f8ef7);
padding:20px;
color:white;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.form-box{
width:550px;
margin:45px auto;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

.form-title{
text-align:center;
margin-bottom:25px;
color:#0d6efd;
}

.form-control{
border-radius:12px;
padding:12px;
}

label{
font-weight:600;
margin-bottom:6px;
}

.icon{
color:#0d6efd;
margin-right:8px;
}

.button-group{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.btn{
border-radius:10px;
padding:10px 20px;
font-weight:500;
}

</style>

</head>
<body>

<div class="header">

<h2>
<i class="fa-solid fa-pen-to-square"></i>
 Edit Appointment
</h2>

</div>

<div class="form-box">

<div class="form-title">

<h3>
<i class="fa-solid fa-calendar-check"></i>
 Update Appointment
</h3>

<p class="text-muted">
Edit appointment details
</p>

</div>

<form th:action="@{/appointments/updateAppointment}" method="post">

<input type="hidden"
name="id"
th:value="${appointment.id}">

<div class="mb-3">

<label>
<i class="fa-solid fa-user icon"></i>
Patient Name
</label>

<input type="text"
name="patientName"
th:value="${appointment.patientName}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>
<i class="fa-solid fa-user-doctor icon"></i>
Doctor Name
</label>

<input type="text"
name="doctorName"
th:value="${appointment.doctorName}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>
<i class="fa-solid fa-calendar icon"></i>
Date
</label>

<input type="date"
name="date"
th:value="${appointment.date}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>
<i class="fa-solid fa-clock icon"></i>
Time
</label>

<input type="time"
name="time"
th:value="${appointment.time}"
class="form-control"
required>

</div>

<div class="button-group">

<button type="submit"
class="btn btn-success">

<i class="fa-solid fa-floppy-disk"></i>
 Update

</button>

<a href="/appointments/viewAppointments"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>
 Back

</a>

</div>

</form>

</div>

</body>
</html>
