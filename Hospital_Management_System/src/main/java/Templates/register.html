<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Hospital Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
height:100vh;
margin:0;
font-family:Arial;
}

.header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#0d6efd;
color:white;
text-align:center;
padding:10px;
}

.register-box{
width:420px;
background:white;
padding:30px;
border-radius:20px;
margin:40px auto;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

</style>
</head>
<body>

<div class="header">
🏥 Hospital Management System
</div>

<div class="register-box">

<h3 class="text-center text-primary mb-4">
User Registration
</h3>

<form th:action="@{/saveUser}" method="post">

<input type="text"
name="username"
placeholder="Username"
class="form-control mb-3"
required>

<input type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required>

<!-- Role Dropdown -->

<select name="role"
class="form-control mb-3"
required>

<option value="">
Select Role
</option>

<option value="ADMIN">
Admin
</option>

<option value="DOCTOR">
Doctor
</option>

<option value="PATIENT">
Patient
</option>

</select>

<button class="btn btn-primary w-100">
Register
</button>

</form>

<div class="text-center mt-3">

Already Registered?

<a th:href="@{/}">
Login Here
</a>

</div>

</div>

<div class="footer">
© 2026 Hospital Management System
</div>

</body>
</html>
