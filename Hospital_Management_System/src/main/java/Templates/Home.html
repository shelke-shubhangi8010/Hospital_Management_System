<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#0f2027;
padding-top:20px;
position:fixed;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.sidebar a:hover{
background:#0d6efd;
padding-left:35px;
}

/* Main */

.main{
margin-left:250px;
width:100%;
}

.header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
padding:60px;
flex-wrap:wrap;
}

.card{
width:280px;
padding:30px;
border:none;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
text-align:center;
}

.footer{
position:fixed;
bottom:0;
left:250px;
right:0;
background:#0d6efd;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>🏥 HMS</h2>


<a href="/login/doctor">Doctor Login</a>
<a href="/login/patient">Patient Login</a>

</div>

<div class="main">

<div class="header">
Hospital Management System
</div>

<div class="cards">



<div class="card">
<h3>Doctor</h3>
<p>Appointments & Prescriptions</p>
<a href="/login/doctor"
class="btn btn-success">
Login
</a>
</div>

<div class="card">
<h3>Patient</h3>
<p>Reports & Booking</p>
<a href="/login/patient"
class="btn btn-info">
Login
</a>
</div>

</div>

<div class="footer">
© 2026 Hospital Management System
</div>

</div>

</body>
</html>
