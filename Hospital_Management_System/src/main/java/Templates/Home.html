<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1584982751601-97dcc096659c') no-repeat center center/cover;
    display: flex;
    flex-direction: column;
}

/* Dark overlay */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    color: white;
    position: relative;
    z-index: 2;
}

nav h1 {
    font-size: 26px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li a {
    text-decoration: none;
    color: white;
    font-weight: 500;
}

/* Center box */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    color: white;
    width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.card h2 {
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.patient {
    background: #00b894;
}

.doctor {
    background: #0984e3;
}

.btn:hover {
    transform: scale(1.05);
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    color: white;
    background: rgba(0,0,0,0.7);
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<div class="overlay"></div>

<nav>
    <h1>🏥 Hospital System</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2>Welcome</h2>
        <p>Choose Login Type</p>

        <a href="/login/patient" class="btn patient">Patient Login</a>
        <a href="/login/doctor" class="btn doctor">Doctor Login</a>
    </div>
</div>

<footer>
    © 2026 Hospital Management System | All Rights Reserved
</footer>

</body>
</html>
