<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Hospital Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
height:100vh;
margin:0;
font-family:Arial;
}

.header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#0d6efd;
color:white;
text-align:center;
padding:10px;
}

.login-box{
width:400px;
background:white;
padding:30px;
border-radius:20px;
margin:90px auto;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

</style>

</head>
<body>

<div class="header">
🏥 Hospital Management System
</div>

<div class="login-box">

<h3 class="text-center text-primary">
<span th:text="${role}"></span> Login
</h3>

<form th:action="@{/login}" method="post">

<input type="text"
name="username"
placeholder="Username"
class="form-control mb-3">

<input type="password"
name="password"
placeholder="Password"
class="form-control mb-3">

<input type="hidden"
name="role"
th:value="${role}">
<button class="btn btn-primary w-100">
Login
</button>

</form>

<div class="text-center mt-3">
<a href="/register">
New User? Register Here
</a>
</div>

</div>

<div class="footer">
© 2026 Hospital Management System
</div>

</body>
</html>
