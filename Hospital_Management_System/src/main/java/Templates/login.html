<html xmlns:th="http://www.thymeleaf.org">

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eaf4ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.login-box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

.btn-login{
    width:100%;
    border-radius:25px;
}

</style>

</head>
<body>

<div class="login-box">

    <h2 class="title">
        🏥 Hospital Login
    </h2>

    <form action="/admin">

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   class="form-control"
                   placeholder="Enter Email">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   class="form-control"
                   placeholder="Enter Password">
        </div>

        <button  type="submit" class="btn btn-primary btn-login">
            Login
        </button>
       

    </form>

</div>

</body>
</html>
