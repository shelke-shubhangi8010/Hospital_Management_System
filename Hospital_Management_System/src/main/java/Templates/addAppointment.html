<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(to right,#e8f1ff,#f6fbff);
min-height:100vh;
}

/* Header */

.header{
background:linear-gradient(to right,#0d6efd,#4f8ef7);
padding:20px;
color:white;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.header h2{
margin:0;
}

/* Form */

.form-box{
width:520px;
margin:45px auto;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 6px 20px rgba(0,0,0,0.12);
transition:0.3s;
}

.form-box:hover{
transform:translateY(-3px);
}

.form-title{
text-align:center;
margin-bottom:25px;
color:#0d6efd;
}

.form-control{
border-radius:12px;
padding:12px;
}

label{
font-weight:600;
margin-bottom:6px;
}

.btn{
border-radius:10px;
padding:10px 20px;
font-weight:500;
}

.icon{
color:#0d6efd;
margin-right:8px;
}

.button-group{
display:flex;
justify-content:space-between;
margin-top:20px;
}

</style>

</head>
<body>

<!-- Header -->

<div class="header">

<h2>
<i class="fa-solid fa-calendar-plus"></i>
 Hospital Appointment Booking
</h2>

</div>

<!-- Form -->

<div class="form-box">

<div class="form-title">
<h3>
<i class="fa-solid fa-stethoscope"></i>
 Book Appointment
</h3>
<p class="text-muted">
Fill appointment details carefully
</p>
</div>

<form th:action="@{/appointments/saveAppointment}" method="post">

<div class="mb-3">
<label>
<i class="fa-solid fa-user icon"></i>
Patient Name
</label>

<input type="text"
name="patientName"
class="form-control"
placeholder="Enter patient name"
required>
</div>

<div class="mb-3">
<label>
<i class="fa-solid fa-user-doctor icon"></i>
Doctor Name
</label>

<input type="text"
name="doctorName"
class="form-control"
placeholder="Enter doctor name"
required>
</div>

<div class="mb-3">
<label>
<i class="fa-solid fa-calendar icon"></i>
Date
</label>

<input type="date"
name="date"
class="form-control"
required>
</div>

<div class="mb-3">
<label>
<i class="fa-solid fa-clock icon"></i>
Time
</label>

<input type="time"
name="time"
class="form-control"
required>
</div>

<div class="button-group">

<button type="submit"
class="btn btn-primary">

<i class="fa-solid fa-calendar-check"></i>
 Book Appointment

</button>

<a href="/appointments/viewAppointments"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>
 Back

</a>

</div>

</form>

</div>

</body>
</html>
