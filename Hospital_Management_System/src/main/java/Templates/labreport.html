<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lab Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Patient Lab Reports</h2>

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Patient Name</th>
<th>Disease</th>
<th>Doctor</th>
<th>Lab Report</th>
</tr>
</thead>

<tbody>

<tr th:each="p : ${patientList}">
    <td th:text="${p.Id}"></td>
    <td th:text="${p.name}"></td>
    <td th:text="${p.disease}"></td>
    <td th:text="${p.doctorName}"></td>
    <td th:text="${p.labReport}"></td>
</tr>


</tbody>

</table>

</div>

</body>
</html>
