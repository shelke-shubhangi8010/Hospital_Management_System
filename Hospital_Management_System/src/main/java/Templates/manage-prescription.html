<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manage Prescription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:linear-gradient(to right,#eef3ff,#dfe9ff);
font-family:'Segoe UI';
}

.container{
margin-top:40px;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
padding:35px;
background:white;
}

.form-control{
border-radius:10px;
padding:10px;
}

.btn{
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h2 class="text-primary mb-4">
<i class="fa-solid fa-file-prescription"></i>
 Manage Prescription
</h2>

<form th:action="@{/prescription/save}" method="post">

<!-- Patient Name -->

<div class="mb-3">
<label>Patient Name</label>
<input type="text"
name="patientName"
class="form-control"
placeholder="Enter patient name"
required>
</div>

<!-- Doctor Name -->

<div class="mb-3">
<label>Doctor Name</label>
<input type="text"
name="doctorName"
class="form-control"
placeholder="Enter doctor name"
required>
</div>

<!-- Medicine -->

<div class="mb-3">
<label>Medicine Name</label>
<input type="text"
name="medicine"
class="form-control"
placeholder="Paracetamol"
required>
</div>

<!-- Dosage -->

<div class="mb-3">
<label>Dosage</label>
<input type="text"
name="dosage"
class="form-control"
placeholder="500mg"
required>
</div>

<!-- Frequency -->

<div class="mb-3">
<label>Frequency</label>
<input type="text"
name="frequency"
class="form-control"
placeholder="2 times a day"
required>
</div>

<!-- Duration -->

<div class="mb-3">
<label>Duration</label>
<input type="text"
name="duration"
class="form-control"
placeholder="5 days"
required>
</div>

<!-- Advice -->

<div class="mb-3">
<label>Advice</label>
<textarea
name="advice"
class="form-control"
rows="3"
placeholder="Take after food"></textarea>
</div>

<!-- Date -->

<div class="mb-3">
<label>Date</label>
<input type="date"
name="date"
class="form-control"
required>
</div>

<button class="btn btn-primary">
<i class="fa-solid fa-floppy-disk"></i>
 Save Prescription
</button>

<a href="/doctor"
class="btn btn-secondary">
Back
</a>

</form>

</div>
</div>

</body>
</html>
