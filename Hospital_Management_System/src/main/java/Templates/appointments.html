<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Appointments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:linear-gradient(to right,#eef3f9,#dbe9ff);
font-family:'Segoe UI';
margin:0;
}

/* Header */

.header{
background:linear-gradient(to right,#0d6efd,#4f8ef7);
padding:20px;
color:white;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.header h2{
margin:0;
}

/* Main */

.container{
margin-top:35px;
}

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.12);
}

/* Buttons */

.btn{
border-radius:10px;
font-weight:500;
}

.table{
border-radius:10px;
overflow:hidden;
}

.table tbody tr:hover{
background:#f1f7ff;
transition:0.3s;
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.back-btn{
text-decoration:none;
}

</style>

</head>
<body>

<!-- Header -->

<div class="header">

<h2>
<i class="fa-solid fa-calendar-check"></i>
 Appointment Management
</h2>

</div>

<!-- Main -->

<div class="container">

<div class="table-box">

<div class="title-row">

<h4>
<i class="fa-solid fa-notes-medical"></i>
 Appointment Records
</h4>

<div>

<a href="/patient"
class="btn btn-secondary">
<i class="fa-solid fa-arrow-left"></i>
 Dashboard
</a>

<a href="/appointments/addAppointment"
class="btn btn-success">
<i class="fa-solid fa-calendar-plus"></i>
 Book Appointment
</a>

</div>

</div>

<table class="table table-bordered table-hover">

<thead class="table-primary">

<tr>
<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th width="180">Action</th>
</tr>

</thead>

<tbody>

<tr th:each="a : ${appointments}">

<td th:text="${a.id}"></td>
<td th:text="${a.patientName}"></td>
<td th:text="${a.doctorName}"></td>
<td th:text="${a.date}"></td>
<td th:text="${a.time}"></td>

<td>

<a th:href="@{/appointments/editAppointment/{id}(id=${a.id})}"
class="btn btn-warning btn-sm">

<i class="fa-solid fa-pen"></i>
 Edit

</a>

<a th:href="@{/appointments/deleteAppointment/{id}(id=${a.id})}"
class="btn btn-danger btn-sm">

<i class="fa-solid fa-trash"></i>
 Delete

</a>

</td>

</tr>

<!-- Empty Data Message -->

<tr th:if="${#lists.isEmpty(appointments)}">
<td colspan="6"
class="text-center text-muted">

<i class="fa-solid fa-circle-info"></i>
 No appointments found

</td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
