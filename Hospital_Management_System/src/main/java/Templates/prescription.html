<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Prescription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fc;
font-family:Arial;
}

.container{
margin-top:40px;
}

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

</style>
</head>
<body>

<div class="container">

<div class="table-box">

<h2 class="mb-4 text-primary">
My Prescription
</h2>

<table class="table table-bordered">

<thead class="table-primary">

<tr>
<th>ID</th>
<th>Doctor</th>
<th>Medicine</th>
<th>Dosage</th>
<th>Frequency</th>
<th>Duration</th>
<th>Advice</th>
<th>Date</th>
</tr>

</thead>

<tbody>

<tr th:each="p : ${prescriptions}">

<td th:text="${p.id}"></td>
<td th:text="${p.doctorName}"></td>
<td th:text="${p.medicine}"></td>
<td th:text="${p.dosage}"></td>
<td th:text="${p.frequency}"></td>
<td th:text="${p.duration}"></td>
<td th:text="${p.advice}"></td>
<td th:text="${p.date}"></td>

</tr>

</tbody>

</table>

<a href="/patient"
class="btn btn-secondary">
Back
</a>

</div>
</div>

</body>
</html>
