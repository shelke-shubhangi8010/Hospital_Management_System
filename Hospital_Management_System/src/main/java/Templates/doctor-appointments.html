<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Appointment List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.header{
background:#0d6efd;
color:white;
padding:18px;
text-align:center;
font-size:25px;
}

.container{
margin-top:40px;
}

.table{
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

</style>

</head>
<body>

<div class="header">
🩺 Doctor Appointment List
</div>

<div class="container">

<a href="/appointments/addAppointment"
class="btn btn-success mb-3">
+ Add Appointment
</a>

<table class="table table-bordered table-hover">

<thead class="table-primary">
<tr>
<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="a : ${appointments}">

<td th:text="${a.id}"></td>
<td th:text="${a.patientName}"></td>
<td th:text="${a.doctorName}"></td>
<td th:text="${a.date}"></td>

<td>

<a th:href="@{/appointments/editAppointment/{id}(id=${a.id})}"
class="btn btn-warning btn-sm">
Edit
</a>

<a th:href="@{/appointments/deleteAppointment/{id}(id=${a.id})}"
class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

</tbody>

</table>

<a href="/doctor"
class="btn btn-secondary">
Back
</a>

</div>

</body>
</html>
