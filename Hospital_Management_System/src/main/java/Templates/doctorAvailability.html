<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Doctor Availability</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:#eef2f7;
font-family:'Segoe UI';
}

.container-box{
margin-top:40px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
color:#0d6efd;
margin-bottom:25px;
text-align:center;
}

.table{
border-radius:15px;
overflow:hidden;
}

.available{
color:green;
font-weight:bold;
}

.notavailable{
color:red;
font-weight:bold;
}

.back-btn{
margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<div class="container-box">

<h2>
<i class="fa-solid fa-user-doctor"></i>
 Doctor Availability
</h2>

<table class="table table-bordered table-hover text-center">

<thead class="table-primary">

<tr>
<th>Doctor Name</th>
<th>Specialization</th>
<th>Available Day</th>
<th>Available Time</th>
<th>Status</th>
<th>Consultation</th>
<th>Fees</th>
</tr>

</thead>

<tbody>

<tr th:each="doctor : ${doctorList}">

<td th:text="${doctor.doctorName}"></td>

<td th:text="${doctor.specialization}"></td>

<td th:text="${doctor.day}"></td>

<td th:text="${doctor.time}"></td>

<td>

<span
th:if="${doctor.status=='Available'}"
class="badge bg-success">
Available
</span>

<span
th:if="${doctor.status=='Not Available'}"
class="badge bg-danger">
Not Available
</span>

<span
th:if="${doctor.status=='On Leave'}"
class="badge bg-warning text-dark">
On Leave
</span>

</td>

<td th:text="${doctor.consultationType}"></td>

<td>
₹ <span th:text="${doctor.fees}"></span>
</td>

</tr>

</tbody>

</table>
<a th:href="@{/patient-dashboard}"
class="btn btn-secondary back-btn">
<i class="fa-solid fa-arrow-left"></i>
 Back Dashboard
</a>

</div>
</div>

</body>
</html>
